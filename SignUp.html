<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>United Punjab</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  
  <body class="bg-[#1C1C1A] text-white font-['Times_New_Roman'] flex items-center justify-center min-h-screen">
  <div
    class="w-full max-w-lg mx-auto bg-[#1C1C1A] shadow-xl rounded-2xl p-6 border border-[#2A2A28]"
  >
    <!-- Logo -->
    <div class="flex justify-center mb-4">
      <img src="logo 2.png" alt="logo" class="h-12" />
    </div>

    <!-- Heading -->
    <h3 class="text-2xl font-semibold text-[#F57517] text-center mb-6">Create New Account</h3>

    <!-- Form -->
    <form class="space-y-5">
      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-300 mb-2">
          Email
        </label>
        <input
          type="email"
          id="email"
          placeholder="Enter your email"
          class="w-full px-4 py-3 rounded-lg bg-[#2A2A28] text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-[#F57517] transition"
        />
      </div>

      <!-- Password -->
      <div>
        <label for="password" class="block text-sm font-medium text-gray-300 mb-2">
          Password
        </label>
        <input
          type="password"
          id="password"
          placeholder="Enter your password"
          class="w-full px-4 py-3 rounded-lg bg-[#2A2A28] text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-[#F57517] transition"
        />
      </div>

      <!-- Confirm Password -->
      <div>
        <label for="password" class="block text-sm font-medium text-gray-300 mb-2">
          Confirm Password
        </label>
        <input
          type="password"
          id="password"
          placeholder="Confirm your password"
          class="w-full px-4 py-3 rounded-lg bg-[#2A2A28] text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-[#F57517] transition"
        />
      </div>

      <!-- Button -->
      <button
        type="submit"
        class="w-full py-3 rounded-lg font-semibold text-white shadow-lg bg-[#F57517] hover:scale-105 transition-transform"
      >
        Sign Up
      </button>
    </form>

    <!-- Footer Links -->
    <p class="mt-6 text-sm text-center text-gray-400">
      Already have an account?
      <a href="Login.html" class="text-[#F57517] hover:underline">Login</a>
    </p>
  </div>
</body>


  
</html>
